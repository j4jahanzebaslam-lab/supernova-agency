<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    background-color: #0d0d0d;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
  }
  .hub-container {
    width: 100%;
    max-width: 900px;
    text-align: center;
  }
  .hub-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666666;
    margin-bottom: 20px;
  }
  .hub-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 768px) {
    .hub-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 480px) {
    .hub-grid {
      grid-template-columns: 1fr;
    }
  }
  .hub-btn {
    background: #141414;
    border: 1px solid #222222;
    border-radius: 4px;
    padding: 18px 12px;
    color: #ffffff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s ease-in-out;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .hub-btn:hover {
    border-color: #ffffff; /* Premium Pure White border highlight */
    background: #191919;
    transform: translateY(-2px);
  }
  .hub-btn span {
    color: #888888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: color 0.2s ease-in-out;
  }
  .hub-btn:hover span {
    color: #ffffff; /* Pure White subtitle text on hover */
  }
  .arrow {
    font-size: 14px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="hub-container">
  <div class="hub-title">Verified Agency Integration Comms</div>
  <div class="hub-grid">
    
    <!-- CHANNEL 1: TIKTOK USA -->
    <a href="https://www.tiktok.com/@supernova_us" target="_blank" class="hub-btn">
      TikTok USA <span class="arrow">↗</span>
      <span>US Territory</span>
    </a>

    <!-- CHANNEL 2: TIKTOK UK -->
    <a href="https://www.tiktok.com/@supernova__uk" target="_blank" class="hub-btn">
      TikTok UK <span class="arrow">↗</span>
      <span>UK Territory</span>
    </a>

    <!-- CHANNEL 3: SECURE WHATSAPP -->
    <a href="https://wa.me/447923116272" target="_blank" class="hub-btn">
      WhatsApp <span class="arrow">↗</span>
      <span>Secure Gateway</span>
    </a>

    <!-- CHANNEL 4: DISCORD HQ -->
    <a href="https://discord.gg/TpEBMADW" target="_blank" class="hub-btn">
      Discord HQ <span class="arrow">↗</span>
      <span>Creator Network</span>
    </a>

  </div>
</div>

</body>
</html>
